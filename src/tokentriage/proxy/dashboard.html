<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenTriage — Ledger</title>
<style>
  /* Design: a cost ledger. Banknote-green ink on paper, tabular monospace
     numerals, hairline rules. The signature element is the budget burn bar. */
  :root{
    --paper:#F7F6F1; --ink:#17281F; --green:#1B4D3E; --green-soft:#DCE7E0;
    --amber:#9A6A12; --red:#8C3226; --rule:#C9CFC7; --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#141A16; --ink:#E8EDE8; --green:#7FB89F; --green-soft:#22352B;
           --amber:#D9A441; --red:#D97B6C; --rule:#2E3A32; }
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font:15px/1.5 var(--mono);padding:32px;max-width:1080px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--ink);padding-bottom:10px}
  h1{font-size:18px;letter-spacing:.08em;text-transform:uppercase}
  h1 span{color:var(--green)}
  .stamp{font-size:12px;color:var(--green)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);margin-top:24px}
  .cell{background:var(--paper);padding:16px}
  .cell .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.65}
  .cell .value{font-size:28px;font-variant-numeric:tabular-nums;margin-top:4px}
  .value.save{color:var(--green)}
  .value.warn{color:var(--amber)}
  /* Signature: budget burn bar */
  .burn{margin-top:24px}
  .burn .label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.65;display:flex;justify-content:space-between}
  .burn .bar{height:14px;border:1px solid var(--ink);margin-top:6px;position:relative;background:var(--green-soft)}
  .burn .fill{position:absolute;inset:0;width:0%;background:var(--green);transition:width .6s ease}
  .burn.hot .fill{background:var(--red)}
  .tiers{margin-top:24px;display:flex;gap:1px;background:var(--rule);border:1px solid var(--rule)}
  .tier{background:var(--paper);flex:1;padding:10px 12px;font-size:13px}
  .tier b{display:block;font-size:20px;font-variant-numeric:tabular-nums}
  table{width:100%;border-collapse:collapse;margin-top:24px;font-size:13px}
  caption{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.65;padding-bottom:8px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--rule);font-variant-numeric:tabular-nums}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.65}
  td.tier-T0{color:var(--green)} td.esc{color:var(--amber)} td.fail{color:var(--red)}
  @media (prefers-reduced-motion: reduce){ .burn .fill{transition:none} }
</style>
</head>
<body>
<header>
  <h1>Token<span>Triage</span> — ledger</h1>
  <div><a href="/chat" style="color:var(--green);font-size:12px;text-decoration:none;text-transform:uppercase;letter-spacing:.1em;margin-right:14px">← playground</a><span class="stamp" id="stamp">connecting…</span></div>
</header>

<div class="grid">
  <div class="cell"><div class="label">Requests (24h)</div><div class="value" id="req">–</div></div>
  <div class="cell"><div class="label">Spend</div><div class="value" id="cost">–</div></div>
  <div class="cell"><div class="label">Always-Pro baseline</div><div class="value" id="base">–</div></div>
  <div class="cell"><div class="label">Saved</div><div class="value save" id="save">–</div></div>
  <div class="cell"><div class="label">Cache hits ($0)</div><div class="value save" id="cache">–</div></div>
  <div class="cell"><div class="label">Escalations</div><div class="value warn" id="esc">–</div></div>
</div>

<div class="burn" id="burn">
  <div class="label"><span>Daily budget burn</span><span id="burnlabel">–</span></div>
  <div class="bar"><div class="fill" id="burnfill"></div></div>
</div>

<div class="tiers" id="tiers"></div>

<table>
  <caption>Decision feed — most recent first</caption>
  <thead><tr><th>Task</th><th>Type</th><th>Tier</th><th>Cost</th><th>Verify</th></tr></thead>
  <tbody id="feed"><tr><td colspan="5">No decisions yet — run <code>tokentriage benchmark</code>.</td></tr></tbody>
</table>

<script>
const usd = v => '$' + Number(v).toFixed(4);
const DAILY_CAP = 5.00; // display only; server enforces the real cap
async function tick(){
  try{
    const s = await (await fetch('/api/stats')).json();
    stamp.textContent = new Date().toLocaleTimeString();
    req.textContent   = s.requests;
    cost.textContent  = usd(s.cost_usd);
    base.textContent  = usd(s.baseline_usd);
    save.textContent  = s.savings_pct + '%';
    cache.textContent = s.cache_hits;
    esc.textContent   = s.escalations;
    const pct = Math.min(100, 100 * s.budget_spent_today / DAILY_CAP);
    burnfill.style.width = pct + '%';
    burnlabel.textContent = usd(s.budget_spent_today) + ' / ' + usd(DAILY_CAP);
    document.getElementById('burn').classList.toggle('hot', pct >= 90);
    tiers.innerHTML = ['T0','T1','T2','T3'].map(t =>
      `<div class="tier">${t}<b>${(s.tier_utilization||{})[t]||0}</b></div>`).join('');
    feed.innerHTML = (s.recent||[]).map(r => `<tr>
      <td>${(r.task_preview||'').slice(0,60)}</td>
      <td>${r.task_type||''}</td>
      <td class="tier-${r.chosen_tier}">${r.chosen_tier}${r.escalated_to?' ↑':''}</td>
      <td>${usd(r.cost_usd||0)}</td>
      <td class="${r.verdict==='fail'?'fail':''}">${r.verdict||'—'}</td>
    </tr>`).join('') || feed.innerHTML;
  }catch(e){ stamp.textContent = 'gateway offline'; }
}
tick(); setInterval(tick, 2000);
</script>
</body>
</html>
