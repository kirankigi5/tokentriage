<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenTriage — Playground</title>
<style>
  /* Matches the dashboard ledger: banknote-green ink on paper, mono numerals. */
  :root{
    --paper:#F7F6F1; --ink:#17281F; --green:#1B4D3E; --green-soft:#DCE7E0;
    --amber:#9A6A12; --red:#8C3226; --rule:#C9CFC7; --user:#E7EEE9;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#141A16; --ink:#E8EDE8; --green:#7FB89F; --green-soft:#22352B;
           --amber:#D9A441; --red:#D97B6C; --rule:#2E3A32; --user:#1E2A22; }
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--paper);color:var(--ink);font:15px/1.5 var(--mono);
       max-width:820px;margin:0 auto;padding:24px;display:flex;flex-direction:column;
       min-height:100vh}
  header{display:flex;justify-content:space-between;align-items:baseline;
         border-bottom:2px solid var(--ink);padding-bottom:10px}
  h1{font-size:18px;letter-spacing:.08em;text-transform:uppercase}
  h1 span{color:var(--green)}
  header a{color:var(--green);font-size:12px;text-decoration:none;text-transform:uppercase;letter-spacing:.1em}
  #feed{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:18px}
  .turn{display:flex;flex-direction:column;gap:8px}
  .user{align-self:flex-end;background:var(--user);border:1px solid var(--rule);
        padding:8px 12px;max-width:80%;border-radius:2px}
  .answer{white-space:pre-wrap}
  /* routing receipt */
  .receipt{border:1px solid var(--rule);border-left:3px solid var(--green);
           background:var(--green-soft);padding:10px 12px;font-size:12.5px}
  .receipt .row{display:flex;flex-wrap:wrap;gap:14px;align-items:baseline}
  .badge{font-weight:700;letter-spacing:.05em;padding:1px 7px;border:1px solid var(--ink);
         border-radius:2px}
  .b-T0{color:var(--green)} .b-T1{color:var(--green)} .b-T2{color:var(--amber)} .b-T3{color:var(--red)}
  .k{opacity:.6;text-transform:uppercase;font-size:10.5px;letter-spacing:.1em}
  .v{font-variant-numeric:tabular-nums}
  .save{color:var(--green);font-weight:700}
  .why{margin-top:6px;opacity:.8;font-style:italic}
  .verdict-pass{color:var(--green)} .verdict-fail{color:var(--red)}
  form{display:flex;gap:8px;border-top:2px solid var(--ink);padding-top:14px}
  textarea{flex:1;resize:none;height:52px;background:var(--paper);color:var(--ink);
           border:1px solid var(--rule);padding:8px 10px;font:15px var(--mono)}
  button{background:var(--green);color:var(--paper);border:none;padding:0 20px;
         font:700 14px var(--mono);text-transform:uppercase;letter-spacing:.08em;cursor:pointer}
  button:disabled{opacity:.5;cursor:wait}
  .hint{font-size:11.5px;opacity:.55;padding:6px 0 0}
</style>
</head>
<body>
<header>
  <h1>Token<span>Triage</span> — playground</h1>
  <div>
    <a href="#" id="clear" style="color:var(--red);font-size:12px;text-decoration:none;text-transform:uppercase;letter-spacing:.1em;margin-right:14px">clear</a>
    <a href="/dashboard">ledger →</a>
  </div>
</header>

<div id="feed">
  <div class="hint" id="hint">Ask anything. Watch which model TokenTriage picks,
  what it cost, and why. Try a simple fact vs. a multi-step analysis vs. a legal
  question — then a follow-up to see it keep context.</div>
</div>

<form id="form">
  <textarea id="input" placeholder="Type a task…  (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send" type="submit">Send</button>
</form>

<script>
const feed = document.getElementById('feed');
const input = document.getElementById('input');
const form = document.getElementById('form');
const send = document.getElementById('send');
const usd = v => '$' + Number(v).toFixed(6);
const KEY = 'tokentriage.history';

// Conversation history: [{role, content, meta?}]. Persisted to localStorage so
// it survives reloads; sent in full to the API so follow-ups keep context.
let history = [];
try { history = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){ history = []; }

function save(){ localStorage.setItem(KEY, JSON.stringify(history)); }

function el(cls, html){ const d=document.createElement('div'); d.className=cls; if(html!=null) d.innerHTML=html; return d; }

function renderTurn(turn){
  const wrap = el('turn');
  if(turn.role === 'user'){
    wrap.appendChild(el('user', turn.content.replace(/</g,'&lt;')));
  } else {
    wrap.appendChild(el('answer', turn.content.replace(/</g,'&lt;')));
    if(turn.meta) wrap.appendChild(receipt(turn.meta, turn.ms));
  }
  feed.appendChild(wrap); return wrap;
}

function renderAll(){
  feed.querySelectorAll('.turn').forEach(n => n.remove());
  const hint = document.getElementById('hint');
  if(hint) hint.style.display = history.length ? 'none' : '';
  history.forEach(renderTurn);
  feed.scrollTop = feed.scrollHeight;
}

function receipt(m, ms){
  const tier = m.chosen_tier;
  const saved = m.baseline_cost_usd > 0 ? (100*(1 - m.cost_usd/m.baseline_cost_usd)) : 0;
  const verdict = m.verdict ? `<span class="verdict-${m.verdict}">${m.verdict}</span>` : '—';
  const esc = m.escalated_to ? ` ↑ escalated to ${m.escalated_to}` : '';
  const cache = m.cache_hit ? ' · cache hit ($0)' : '';
  return el('receipt', `
    <div class="row">
      <span class="badge b-${tier}">${tier}</span>
      <span class="v">${m.model_id||''}</span>
      <span><span class="k">type</span> ${m.task_type}</span>
      <span><span class="k">cost</span> <span class="v">${usd(m.cost_usd)}</span></span>
      <span><span class="k">vs cloud</span> <span class="v">${usd(m.baseline_cost_usd)}</span></span>
      <span class="save">${saved.toFixed(1)}% saved</span>
      <span><span class="k">verify</span> ${verdict}${esc}${cache}</span>
      <span><span class="k">latency</span> <span class="v">${ms} ms</span></span>
    </div>
    <div class="why">${(m.rationale||'').replace(/</g,'&lt;')}</div>`);
}

async function ask(text){
  history.push({role:'user', content:text}); save();
  const uwrap = renderTurn(history[history.length-1]);
  const thinking = el('answer', '…routing…'); const twrap = el('turn'); twrap.appendChild(thinking);
  feed.appendChild(twrap); feed.scrollTop = feed.scrollHeight;
  const t0 = performance.now();
  try{
    // send the whole conversation (role/content only) for multi-turn context
    const payload = history.map(({role, content}) => ({role, content}));
    const res = await fetch('/v1/chat/completions', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({messages: payload})
    });
    const data = await res.json();
    const ms = Math.round(performance.now() - t0);
    twrap.remove();
    if(data.error){
      const err = el('turn'); err.appendChild(el('answer', 'Blocked: ' + data.error.message));
      err.querySelector('.answer').style.color='var(--red)'; feed.appendChild(err); return;
    }
    const answer = data.choices[0].message.content;
    history.push({role:'assistant', content:answer, meta:data.tokentriage, ms}); save();
    renderTurn(history[history.length-1]);
  }catch(e){
    twrap.remove();
    const err = el('turn'); err.appendChild(el('answer', 'Error: ' + e.message));
    err.querySelector('.answer').style.color='var(--red)'; feed.appendChild(err);
  }
  feed.scrollTop = feed.scrollHeight;
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const text = input.value.trim(); if(!text) return;
  input.value=''; send.disabled=true;
  const hint = document.getElementById('hint'); if(hint) hint.style.display='none';
  await ask(text);
  send.disabled=false; input.focus();
});

document.getElementById('clear').addEventListener('click', (e)=>{
  e.preventDefault(); history = []; save(); renderAll();
});

renderAll();  // restore any persisted conversation on load
input.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
