<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenTriage — Playground</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
  :root{
    color-scheme: light;
    --paper:#f8f5ee;
    --panel:#fffdf8;
    --panel-2:#f0eee7;
    --ink:#17201c;
    --muted:#6a706b;
    --rule:#d7d0c2;
    --cache:#168a68;
    --qwen:#385acb;
    --qwen-2:#6f46c8;
    --pro:#c24a3a;
    --verify:#a66b11;
    --shadow:0 10px 30px rgba(17,24,39,.07);
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      color-scheme: dark;
      --paper:#151512;
      --panel:#1e1e19;
      --panel-2:#28271f;
      --ink:#f1efe7;
      --muted:#aaa59a;
      --rule:#3b382f;
      --cache:#46c59c;
      --qwen:#7f9aff;
      --qwen-2:#ac84ff;
      --pro:#ff846f;
      --verify:#e1a540;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }
  }
  *{box-sizing:border-box}
  html,body{
    height:100%;
    min-height:100%;
    margin:0;
  }
  body{
    background:
      linear-gradient(90deg, color-mix(in srgb, var(--rule) 35%, transparent) 1px, transparent 1px) 0 0/42px 42px,
      linear-gradient(0deg, color-mix(in srgb, var(--rule) 28%, transparent) 1px, transparent 1px) 0 0/42px 42px,
      linear-gradient(135deg, color-mix(in srgb, var(--cache) 7%, transparent), transparent 34%),
      var(--paper);
    color:var(--ink);
    font:14px/1.45 var(--sans);
    padding:14px;
    overflow:hidden;
  }
  a{color:inherit}
  .shell{
    width:min(1280px,100%);
    height:calc(100dvh - 28px);
    min-height:0;
    margin:0 auto;
    display:grid;
    grid-template-columns:236px minmax(0,1fr) 260px;
    gap:12px;
  }
  .sidebar{
    min-height:0;
    display:grid;
    grid-template-rows:auto auto auto 1fr auto;
    gap:12px;
    padding:12px;
    border:1px solid var(--rule);
    border-radius:12px;
    background:color-mix(in srgb, var(--panel) 94%, transparent);
    box-shadow:none;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    min-height:58px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .brand-mark{
    width:36px;
    height:36px;
    border-radius:8px;
    box-shadow:4px 4px 0 color-mix(in srgb, var(--cache) 28%, transparent);
    object-fit:cover;
  }
  h1{
    margin:0;
    font-size:17px;
    line-height:1.05;
  }
  .brand p{
    margin:3px 0 0;
    color:var(--muted);
    font:11px/1.2 var(--mono);
  }
  .top-actions{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .link-button{
    height:34px;
    padding:0 10px;
    display:inline-grid;
    place-items:center;
    border:1px solid var(--rule);
    border-radius:8px;
    background:color-mix(in srgb, var(--panel) 86%, transparent);
    color:var(--ink);
    font:700 12px/1 var(--mono);
    text-decoration:none;
    cursor:pointer;
  }
  .link-button.primary{
    width:100%;
    height:36px;
    justify-content:center;
    border-color:var(--ink);
    background:var(--ink);
    color:var(--paper);
  }
  .link-button.is-active{
    border-color:color-mix(in srgb, var(--cache) 46%, var(--rule));
    color:var(--cache);
    background:color-mix(in srgb, var(--cache) 8%, var(--panel));
  }
  .link-button.danger{color:var(--pro)}
  .sidebar-nav{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }
  .history-block{
    min-height:0;
    display:grid;
    grid-template-rows:auto 1fr;
    gap:9px;
  }
  .history-title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:var(--muted);
    font:900 11px/1 var(--mono);
    text-transform:uppercase;
  }
  .history-list{
    min-height:0;
    overflow-y:auto;
    display:grid;
    align-content:start;
    gap:4px;
    padding-right:2px;
  }
  .history-item{
    width:100%;
    min-width:0;
    display:grid;
    grid-template-columns:minmax(0,1fr) 28px;
    align-items:center;
    gap:4px;
    border:1px solid transparent;
    border-radius:8px;
    background:transparent;
  }
  .history-item:hover,
  .history-item.is-active{
    border-color:var(--rule);
    background:var(--panel-2);
  }
  .history-load{
    min-width:0;
    display:grid;
    gap:3px;
    padding:8px 0 8px 8px;
    color:var(--ink);
    text-align:left;
    text-decoration:none;
  }
  .history-load b{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font:700 12px/1.2 var(--sans);
  }
  .history-load span{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--muted);
    font:11px/1.2 var(--mono);
  }
  .history-menu-wrap{ position:relative; }
  .history-menu-btn{
    width:24px;
    height:24px;
    display:grid;
    place-items:center;
    border:1px solid transparent;
    border-radius:6px;
    background:transparent;
    color:var(--muted);
    font:900 13px/1 var(--sans);
    text-decoration:none;
    margin-right:4px;
  }
  .history-menu-btn:hover{
    color:var(--ink);
    background:color-mix(in srgb, var(--ink) 8%, transparent);
  }
  .history-dropdown{
    position:absolute;
    right:0;
    top:28px;
    background:var(--panel);
    border:1px solid var(--rule);
    border-radius:8px;
    box-shadow:var(--shadow);
    display:none;
    flex-direction:column;
    min-width:120px;
    padding:4px;
    z-index:100;
  }
  .history-dropdown.is-open{ display:flex; }
  .history-dropdown a{
    display:block;
    padding:6px 8px;
    color:var(--ink);
    text-decoration:none;
    font:500 12px/1.2 var(--sans);
    border-radius:6px;
  }
  .history-dropdown a:hover{ background:var(--panel-2); }
  .history-dropdown a.is-danger{ color:var(--pro); }
  .history-dropdown a.is-danger:hover{ background:color-mix(in srgb, var(--pro) 8%, transparent); }
  .history-rename-input{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    color: var(--ink);
    font: 700 12px/1.2 var(--sans);
    padding: 2px 4px;
    outline: none;
    margin: -3px -5px;
  }
  .history-rename-input:focus{ border-color:var(--qwen); }
  .hist-empty{
    color:var(--muted);
    padding:12px 4px;
    font:12px/1.35 var(--mono);
  }
  .sidebar-foot{
    display:grid;
    gap:8px;
  }
  .chat-shell{
    min-height:0;
    display:grid;
    grid-template-rows:minmax(0,1fr) auto auto;
    overflow:hidden;
    border:1px solid var(--rule);
    border-radius:12px;
    background:color-mix(in srgb, var(--panel) 94%, transparent);
    box-shadow:var(--shadow);
  }
  .inspector{
    min-height:0;
    display:grid;
    grid-template-rows:auto 1fr;
    gap:10px;
    border:1px solid var(--rule);
    border-radius:12px;
    background:var(--panel);
    overflow:hidden;
    box-shadow:none;
  }
  .inspector-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    min-height:42px;
    padding:0 12px;
    border-bottom:1px solid var(--rule);
  }
  .inspector-head b{
    font:900 12px/1 var(--mono);
    text-transform:uppercase;
  }
  .inspector-head a{
    color:var(--muted);
    font:800 11px/1 var(--mono);
    text-decoration:none;
  }
  .inspector-body{
    min-height:0;
    overflow:auto;
    padding:12px;
  }
  .inspector-empty{
    color:var(--muted);
    font:12px/1.4 var(--mono);
  }
  .inspector-model{
    display:flex;
    align-items:center;
    gap:9px;
    margin-bottom:12px;
  }
  .inspector-token{
    width:34px;
    height:34px;
    flex:0 0 34px;
    display:grid;
    place-items:center;
    border-radius:8px;
    color:white;
    background:linear-gradient(135deg,var(--qwen),var(--qwen-2));
    font:900 11px/1 var(--mono);
  }
  .inspector-token img,
  .model-logo img{
    width:72%;
    height:72%;
    object-fit:contain;
    display:block;
    background:white;
    border-radius:6px;
    padding:2px;
    box-shadow:0 0 0 1px rgba(255,255,255,.6);
  }
  .inspector-token img{
    width:74%;
    height:74%;
    padding:3px;
  }
  .inspector-token.cache{background:linear-gradient(135deg,var(--cache),#0b5d49)}
  .inspector-token.pro{background:linear-gradient(135deg,var(--pro),#843126)}
  .inspector-token.verify{background:linear-gradient(135deg,var(--verify),#7a4b09)}
  .inspector-title{
    min-width:0;
    display:grid;
    gap:2px;
  }
  .inspector-title b,
  .inspector-title span{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .inspector-title b{font-size:13px}
  .inspector-title span{color:var(--muted);font:11px/1.2 var(--mono)}
  .inspector-save{
    height:34px;
    display:grid;
    place-items:center;
    margin-bottom:10px;
    border:1px solid color-mix(in srgb, var(--cache) 42%, var(--rule));
    border-radius:8px;
    color:var(--cache);
    background:color-mix(in srgb, var(--cache) 6%, transparent);
    font:900 18px/1 var(--mono);
  }
  .inspector-kv{
    display:grid;
    gap:1px;
    overflow:hidden;
    border:1px solid var(--rule);
    border-radius:8px;
    background:var(--rule);
  }
  .inspector-row{
    min-width:0;
    display:grid;
    gap:3px;
    background:var(--panel);
    padding:8px;
  }
  .inspector-row span{
    color:var(--muted);
    font:800 10px/1 var(--mono);
    text-transform:uppercase;
  }
  .code-label{
    margin:12px -12px -12px;
    padding:4px 12px;
    background:var(--rule);
    color:var(--ink);
    font:800 10px/1 var(--mono);
    text-transform:uppercase;
    border-radius:6px 6px 0 0;
  }
  .katex-display {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px 0;
  }
  .inspector-row b{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font:800 12px/1.2 var(--mono);
  }
  .inspector-why{
    margin-top:10px;
    color:var(--muted);
    font-size:12px;
  }
  #feed{
    min-height:0;
    overflow-y:auto;
    overscroll-behavior:contain;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    scroll-behavior:smooth;
  }
  .empty{
    height:100%;
    min-height:0;
    display:grid;
    place-items:center;
    color:var(--muted);
  }
  .empty-inner{
    width:min(540px,100%);
    display:grid;
    gap:12px;
    text-align:center;
  }
  .empty h2{
    margin:0;
    font-size:18px;
  }
  .example-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
  }
  .example{
    border:1px solid var(--rule);
    background:var(--panel);
    color:var(--ink);
    border-radius:8px;
    padding:7px 9px;
    font:700 11px/1.1 var(--mono);
    cursor:pointer;
  }
  .turn{
    width:100%;
    display:grid;
    gap:6px;
  }
  .turn.selectable{cursor:pointer}
  .turn.selectable:hover .answer{border-color:color-mix(in srgb, var(--qwen) 42%, var(--rule))}
  .bubble{
    max-width:min(680px,82%);
    border:1px solid var(--rule);
    border-radius:12px;
    padding:10px 12px;
    word-break:break-word;
  }
  .user{
    justify-self:end;
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
    white-space:pre-wrap;
  }
  .answer{
    justify-self:start;
    background:var(--panel);
  }
  .answer > :first-child{margin-top:0}
  .answer > :last-child{margin-bottom:0}
  .answer p{
    margin:0 0 10px;
  }
  .answer h1,
  .answer h2,
  .answer h3,
  .answer h4{
    margin:14px 0 7px;
    line-height:1.2;
    letter-spacing:0;
  }
  .answer h1{font-size:20px}
  .answer h2{font-size:18px}
  .answer h3{font-size:16px}
  .answer h4{font-size:15px}
  .answer ul,
  .answer ol{
    margin:0 0 13px;
    padding-left:22px;
  }
  .answer li + li{margin-top:5px}
  .answer code{
    border:1px solid color-mix(in srgb, var(--rule) 78%, transparent);
    border-radius:6px;
    background:var(--panel-2);
    padding:1px 5px;
    font:850 13px/1.35 var(--mono);
  }
  .answer pre{
    position:relative;
    max-width:100%;
    margin:12px 0 16px;
    overflow:auto;
    border:1px solid var(--rule);
    border-radius:12px;
    background:color-mix(in srgb, var(--ink) 7%, var(--panel-2));
    padding:13px 14px;
  }
  .answer pre code{
    display:block;
    min-width:max-content;
    border:0;
    border-radius:0;
    background:transparent;
    padding:0;
    color:var(--ink);
    font:800 13px/1.55 var(--mono);
    white-space:pre;
    word-break:normal;
  }
  .answer .code-label{
    display:inline-grid;
    place-items:center;
    min-height:22px;
    margin:0 0 7px;
    padding:0 8px;
    border:1px solid color-mix(in srgb, var(--qwen) 38%, var(--rule));
    border-radius:999px;
    color:var(--qwen);
    background:color-mix(in srgb, var(--qwen) 8%, transparent);
    font:900 10px/1 var(--mono);
    text-transform:uppercase;
  }
  .answer blockquote{
    margin:0 0 13px;
    border-left:3px solid var(--qwen);
    padding:2px 0 2px 12px;
    color:color-mix(in srgb, var(--ink) 78%, var(--muted));
  }
  .thinking{
    width:max-content;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--muted);
    font:700 12px/1 var(--mono);
  }
  .spinner{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid color-mix(in srgb, var(--qwen) 24%, var(--rule));
    border-top-color:var(--qwen);
    animation:spin .8s linear infinite;
  }
  .route-trace{
    justify-self:start;
    width:min(680px,100%);
    border:1px solid var(--rule);
    border-radius:10px;
    background:var(--panel);
    overflow:hidden;
  }
  .route-trace.is-live{
    border-color:color-mix(in srgb, var(--qwen) 38%, var(--rule));
  }
  .route-trace summary{
    min-height:34px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:0 10px;
    cursor:pointer;
    color:var(--muted);
    font:800 11px/1 var(--mono);
    list-style:none;
  }
  .route-trace summary::-webkit-details-marker{display:none}
  .trace-summary-left{
    min-width:0;
    display:flex;
    align-items:center;
    gap:7px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .trace-summary-left::before{
    content:"+";
    width:16px;
    height:16px;
    flex:0 0 16px;
    display:grid;
    place-items:center;
    border:1px solid var(--rule);
    border-radius:5px;
    color:var(--muted);
    font:900 11px/1 var(--mono);
  }
  .route-trace[open] .trace-summary-left::before{
    content:"-";
  }
  .route-trace.is-live .trace-summary-left::after{
    content:"live";
    flex:0 0 auto;
    color:var(--qwen);
    font:900 10px/1 var(--mono);
    text-transform:uppercase;
  }
  .trace-summary-right{
    flex:0 0 auto;
    color:var(--ink);
  }
  .trace-list{
    display:grid;
    border-top:1px solid var(--rule);
    background:var(--panel);
    padding:5px 0 8px;
  }
  .trace-item{
    position:relative;
    display:grid;
    grid-template-columns:24px minmax(0,1fr);
    align-items:start;
    min-height:34px;
    padding:0 10px;
    font-size:12px;
  }
  .trace-branch{
    position:relative;
    width:24px;
    min-height:34px;
    align-self:stretch;
  }
  .trace-branch::before{
    content:"";
    position:absolute;
    left:9px;
    top:0;
    bottom:0;
    border-left:1px solid var(--rule);
  }
  .trace-branch::after{
    content:"";
    position:absolute;
    left:9px;
    top:16px;
    width:10px;
    border-top:1px solid var(--rule);
  }
  .trace-item:last-child .trace-branch::before{
    bottom:calc(100% - 16px);
  }
  .trace-node{
    min-width:0;
    display:grid;
    gap:3px;
    padding:5px 0 7px;
  }
  .trace-main{
    min-width:0;
    display:flex;
    align-items:center;
    gap:7px;
  }
  .trace-used{
    flex:0 0 auto;
    color:var(--muted);
    font:900 10px/1 var(--mono);
    text-transform:uppercase;
  }
  .trace-name{
    flex:1 1 auto;
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-weight:750;
  }
  .trace-stage{
    flex:0 0 auto;
    max-width:120px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    padding:3px 6px;
    border:1px solid color-mix(in srgb, var(--qwen) 28%, var(--rule));
    border-radius:999px;
    background:color-mix(in srgb, var(--qwen) 6%, transparent);
    color:var(--qwen);
    font:850 10px/1 var(--mono);
  }
  .trace-detail{
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:var(--muted);
  }
  .trace-extra{
    margin:2px 0 0;
  }
  .trace-extra summary{
    justify-content:flex-start;
    min-height:24px;
    padding:0;
    color:var(--muted);
    font:800 10px/1 var(--mono);
  }
  .trace-extra pre{
    max-height:160px;
    overflow:auto;
    margin:0 0 5px;
    border:1px solid var(--rule);
    border-radius:8px;
    background:var(--panel-2);
    padding:8px;
    font:750 11px/1.4 var(--mono);
  }
  .receipt{
    justify-self:start;
    width:min(680px,100%);
    border:1px solid var(--rule);
    border-radius:10px;
    background:var(--panel);
    overflow:hidden;
  }
  .receipt-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:9px 10px;
    border-bottom:1px solid var(--rule);
  }
  .receipt-model{
    min-width:0;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .model-token{
    width:30px;
    height:30px;
    flex:0 0 30px;
    display:grid;
    place-items:center;
    border-radius:8px;
    color:white;
    background:linear-gradient(135deg,var(--qwen),var(--qwen-2));
    font:900 10px/1 var(--mono);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);
  }
  .model-token.cache{background:linear-gradient(135deg,var(--cache),#0b5d49)}
  .model-token.pro{background:linear-gradient(135deg,var(--pro),#843126)}
  .model-token.verify{background:linear-gradient(135deg,var(--verify),#7a4b09)}
  .receipt-title{
    display:grid;
    min-width:0;
  }
  .receipt-title b{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .receipt-title span{
    color:var(--muted);
    font:11px/1.2 var(--mono);
  }
  .receipt-save{
    flex:0 0 auto;
    display:grid;
    place-items:center;
    min-width:68px;
    height:28px;
    border:1px solid color-mix(in srgb, var(--cache) 42%, var(--rule));
    border-radius:999px;

<script>
const feed = document.getElementById('feed');
const empty = document.getElementById('empty');
const input = document.getElementById('input');
const form = document.getElementById('form');
const micBtn = document.getElementById('mic');

// Voice Recognition
let recognition = null;
let isListening = false;
if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.continuous = false;
  recognition.interimResults = true;
  
  let startValue = '';
  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('is-listening');
    startValue = input.value;
  };
  recognition.onresult = (e) => {
    let transcript = '';
    for(let i = e.resultIndex; i < e.results.length; ++i) transcript += e.results[i][0].transcript;
    const prefix = startValue && !startValue.endsWith(' ') ? startValue + ' ' : startValue;
    input.value = prefix + transcript;
    input.scrollTop = input.scrollHeight;
  };
  recognition.onerror = () => { isListening = false; micBtn.classList.remove('is-listening'); };
  recognition.onend = () => { isListening = false; micBtn.classList.remove('is-listening'); };
  
  micBtn.addEventListener('click', () => {
    if(isListening) recognition.stop();
    else recognition.start();
  });
} else {
  micBtn.style.display = 'none';
}
const send = document.getElementById('send');
const modelTrack = document.getElementById('modelTrack');
const railStatus = document.getElementById('railStatus');
const inspectorBody = document.getElementById('inspectorBody');
const KEY = 'tokentriage.history';

const MODEL_STACK = [
  {tier:'T0', name:'Nomic Embed', detail:'semantic cache', logo:'NE', img:'/imgs/logos/nomic.png', accent:'var(--cache)', token:'cache'},
  {tier:'T1', name:'Qwen 2.5', detail:'3B local', logo:'Q3', img:'/imgs/logos/qwen.png', accent:'var(--cache)', token:'cache'},
  {tier:'T2', name:'Qwen 2.5', detail:'7B local', logo:'Q7', img:'/imgs/logos/qwen.png', accent:'var(--qwen)', token:''},
  {tier:'T3', name:'Qwen 2.5', detail:'14B local', logo:'Q14', img:'/imgs/logos/qwen.png', accent:'var(--pro)', token:'pro'},
  {tier:'V',  name:'Verifier', detail:'Qwen 7B judge', logo:'V', img:'/imgs/logos/qwen.png', accent:'var(--verify)', token:'verify'},
];

const STAGE_LABELS = {
  ROUTING: 'TokenTriage Routing',
  SANITIZED: 'Security Gateway',
  CACHE_HIT: 'Semantic Cache',
  CACHE_MISS: 'Semantic Cache',
  TRIAGED: 'Triage Agent',
  ROUTED: 'Policy Engine',
  DISPATCHING: 'Model Dispatch',
  DISPATCHED: 'Model Dispatch',
  CONTEXT: 'Privacy Firewall',
  VERIFYING: 'Verifier Agent',
  VERIFIED_PASS: 'Verifier Agent',
  VERIFIED_FAIL: 'Verifier Agent',
  ESCALATING: 'Escalation',
  ESCALATED_T1: 'Escalation',
  ESCALATED_T2: 'Escalation',
  ESCALATED_T3: 'Escalation',
  DONE: 'Savings Receipt',
  QUARANTINE: 'Security Gateway',
  ERROR: 'Routing Error',
};

let history = [];
let scanTimer = null;
let scanIndex = -1;
let railState = {mode:'idle', selected:null, verified:false, escalatedTo:null, cacheHit:false};

try { history = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){ history = []; }

const usd = v => '$' + Number(v || 0).toFixed(6);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
}[c]));

function inlineMarkdown(text){
  return esc(text)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
}

function renderMarkdownBlocks(text){
  const lines = text.replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let para = [];

  const flushPara = () => {
    if(!para.length) return;
    html += `<p>${para.map(inlineMarkdown).join('<br>')}</p>`;
    para = [];
  };

  for(let i = 0; i < lines.length; i++){
    const line = lines[i];
    const trimmed = line.trim();
    if(!trimmed){
      flushPara();
      continue;
    }

    const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
    if(heading){
      flushPara();
      const level = Math.min(4, heading[1].length);
      html += `<h${level}>${inlineMarkdown(heading[2])}</h${level}>`;
      continue;
    }

    if(/^>\s+/.test(trimmed)){
      flushPara();
      const quote = [];
      while(i < lines.length && /^>\s+/.test(lines[i].trim())){
        quote.push(lines[i].trim().replace(/^>\s+/, ''));
        i++;
      }
      i--;
      html += `<blockquote>${quote.map(inlineMarkdown).join('<br>')}</blockquote>`;
      continue;
    }

    if(/^[-*]\s+/.test(trimmed)){
      flushPara();
      const items = [];
      while(i < lines.length && /^[-*]\s+/.test(lines[i].trim())){
        items.push(lines[i].trim().replace(/^[-*]\s+/, ''));
        i++;
      }
      i--;
      html += `<ul>${items.map(item => `<li>${inlineMarkdown(item)}</li>`).join('')}</ul>`;
      continue;
    }

    if(/^\d+\.\s+/.test(trimmed)){
      flushPara();
      const items = [];
      while(i < lines.length && /^\d+\.\s+/.test(lines[i].trim())){
        items.push(lines[i].trim().replace(/^\d+\.\s+/, ''));
        i++;
      }
      i--;
      html += `<ol>${items.map(item => `<li>${inlineMarkdown(item)}</li>`).join('')}</ol>`;
      continue;
    }

    para.push(line);
  }
  flushPara();
  return html;
}

function renderMarkdown(text){
  const src = String(text ?? '').replace(/\r\n/g, '\n');
  const fence = /```([a-zA-Z0-9_+#.-]*)?\n?([\s\S]*?)```|\\\[([\s\S]*?)\\\]|\$\$([\s\S]*?)\$\$/g;
  let html = '';
  let last = 0;
  let match;

  while((match = fence.exec(src))){
    html += renderMarkdownBlocks(src.slice(last, match.index));
    if(match[2] !== undefined){
      // Code block
      const lang = (match[1] || '').trim();
      const label = lang ? `<div class="code-label">${esc(lang)}</div>` : '';
      html += `${label}<pre><code>${esc(match[2].replace(/\n$/, ''))}</code></pre>`;
    } else {
      // Math block
      const content = match[3] !== undefined ? match[3] : match[4];
      const left = match[3] !== undefined ? '\\[' : '$$';
      const right = match[3] !== undefined ? '\\]' : '$$';
      html += `<div class="katex-display">${left}${esc(content)}${right}</div>`;
    }
    last = fence.lastIndex;
  }
  html += renderMarkdownBlocks(src.slice(last));
  return html || '<p></p>';
}

const CONV_KEY = 'tokentriage.convId';
function newConvId(){ return (window.crypto && crypto.randomUUID && crypto.randomUUID()) || ('c' + Date.now().toString(36)); }
let convId = localStorage.getItem(CONV_KEY) || newConvId();
localStorage.setItem(CONV_KEY, convId);

// Persist the conversation server-side (SQLite) so it survives across devices
// and reloads. Fire-and-forget; localStorage stays as the fast local cache.
function persist(){
  if(!history.length) return;
  fetch('/conversations', {method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({id: convId, messages: history})})
    .then(() => refreshHistory())
    .catch(()=>{});
}
function save(){ localStorage.setItem(KEY, JSON.stringify(history)); persist(); }

function modelForTier(tier){
  return MODEL_STACK.find(m => m.tier === tier) || {
    tier, name:'TokenTriage', detail:String(tier || ''), logo:'TT', accent:'var(--qwen)', token:''
  };
}

function logoHtml(model){
  return model.img ? `<img src="${esc(model.img)}" alt="" loading="lazy">` : esc(model.logo);
}

function setEmpty(){
  empty.style.display = history.length ? 'none' : 'grid';
}

function renderRail(){
  const selected = railState.cacheHit ? 'T0' : railState.selected;
  railStatus.textContent =
    railState.mode === 'routing' ? 'Checking local stack' :
    selected ? `${selected} selected` : 'Idle';

  // Build orbit DOM structure
  const count = MODEL_STACK.length;
  const angleStep = 360 / count;
  // Radius: half the orbit-container size minus card half-width
  const radius = 55; // ~half of 160px minus half card width

  let orbitRingClass = 'orbit-ring';
  let orbitContainerClass = 'orbit-container';
  if(railState.mode === 'routing'){
    orbitRingClass += ' is-routing';
    orbitContainerClass += ' is-spinning';
  } else if(railState.mode === 'complete'){
    orbitRingClass += ' is-complete';
    orbitContainerClass += ' is-stopping';
  }

  // Determine current orbit rotation for counter-rotation
  const isSpinning = railState.mode === 'routing';

  const cards = MODEL_STACK.map((m, i) => {
    const isVerifier = m.tier === 'V';
    const isSelected = selected === m.tier || (isVerifier && railState.verified);
    const isScanning = railState.mode === 'routing' && scanIndex === i;
    const isMuted = railState.mode === 'complete' && !isSelected;
    const detail = isVerifier && railState.verified
      ? (railState.escalatedTo ? `esc → ${railState.escalatedTo}` : 'pass')
      : m.detail;

    const angle = angleStep * i - 90; // start from top
    const rad = angle * Math.PI / 180;
    const x = 80 + radius * Math.cos(rad) - 29; // 80 = center of 160, 29 = half card width
    const y = 80 + radius * Math.sin(rad) - 29;

    const classes = ['model-card',
      isSelected ? 'is-selected' : '',
      isScanning ? 'is-scanning' : '',
      isMuted ? 'is-muted' : ''
    ].filter(Boolean).join(' ');

    return `<div class="${classes}"
      style="--accent:${m.accent};left:${x}px;top:${y}px"
      aria-label="${esc(m.name)} ${esc(detail)}">
        <div class="model-card-inner">
          <div class="model-logo">${logoHtml(m)}</div>
          <div class="model-copy">
            <b>${esc(m.name)}</b>
            <span>${esc(m.tier)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  // Center winner display
  let centerHtml = '';
  if(railState.mode === 'complete' && selected){
    const wm = modelForTier(selected);
    centerHtml = `<div class="orbit-center is-visible">
      <div class="orbit-center-logo" style="background:linear-gradient(135deg,${wm.accent},color-mix(in srgb, ${wm.accent} 62%, black))">
        ${logoHtml(wm)}
      </div>
      <div class="orbit-center-label">${esc(wm.name)}</div>
      <div class="orbit-center-sub">${esc(selected)} selected</div>
    </div>`;
  } else {
    centerHtml = '<div class="orbit-center"></div>';
  }

  modelTrack.innerHTML = `
    <div class="${orbitRingClass}"></div>
    ${centerHtml}
    <div class="${orbitContainerClass}" id="orbitContainer">
      ${cards}
    </div>
  `;

  // Counter-rotate card inner content to keep text upright during spin
  if(isSpinning){
    startCounterRotation();
  } else {
    stopCounterRotation();
  }
}

let counterRotRAF = null;
let orbitStartTime = null;
function startCounterRotation(){
  if(counterRotRAF) return;
  orbitStartTime = performance.now();
  function tick(){
    const container = document.getElementById('orbitContainer');
    if(!container){
      counterRotRAF = null;
      return;
    }
    // orbit-spin is 3s per revolution
    const elapsed = (performance.now() - orbitStartTime) / 1000;
    const angle = (elapsed / 3) * 360;
    const inners = container.querySelectorAll('.model-card-inner');
    inners.forEach(el => {
      el.style.transform = `rotate(${-angle}deg)`;
    });
    counterRotRAF = requestAnimationFrame(tick);
  }
  counterRotRAF = requestAnimationFrame(tick);
}
function stopCounterRotation(){
  if(counterRotRAF){
    cancelAnimationFrame(counterRotRAF);
    counterRotRAF = null;
  }
  // Reset inner rotations
  const inners = document.querySelectorAll('.model-card-inner');
  inners.forEach(el => { el.style.transform = 'rotate(0deg)'; });
}

function beginRouting(){
  railState = {mode:'routing', selected:null, verified:false, escalatedTo:null, cacheHit:false};
  scanIndex = -1;
  if(scanTimer) clearInterval(scanTimer);
  // Expand the rail
  const rail = document.getElementById('modelRail');
  rail.classList.add('is-open');
  scanTimer = setInterval(() => {
    scanIndex = (scanIndex + 1) % MODEL_STACK.length;
    // Only update card classes, not full re-render (to keep spin smooth)
    const container = document.getElementById('orbitContainer');
    if(container){
      const cards = container.querySelectorAll('.model-card');
      cards.forEach((card, i) => {
        card.classList.toggle('is-scanning', i === scanIndex);
      });
    }
  }, 350);
  renderRail();
}

function flyToReceipt(meta, callback){
  const selected = meta?.cache_hit ? 'T0' : (meta?.chosen_tier || null);
  if(!selected){ if(callback) callback(); return; }
  const wm = modelForTier(selected);

  // Find the orbit center and the receipt logo
  const centerEl = document.querySelector('.orbit-center');
  const targetEl = document.querySelector('.inspector-token');
  if(!centerEl || !targetEl){ if(callback) callback(); return; }

  const fromRect = centerEl.getBoundingClientRect();
  const toRect = targetEl.getBoundingClientRect();

  // Ghost logo size
  const ghostSize = 40;

  // Create the flying ghost
  const ghost = document.createElement('div');
  ghost.className = 'fly-ghost';
  ghost.innerHTML = `
    <div class="fly-ghost-logo" style="background:linear-gradient(135deg,${wm.accent},color-mix(in srgb, ${wm.accent} 62%, black))">
      ${logoHtml(wm)}
    </div>
    <div class="fly-ghost-label">${esc(wm.name)} · ${esc(selected)}</div>
  `;
  // Start at orbit center
  ghost.style.left = (fromRect.left + fromRect.width/2 - ghostSize/2) + 'px';
  ghost.style.top = (fromRect.top + fromRect.height/2 - ghostSize/2) + 'px';
  document.body.appendChild(ghost);

  // Compute scale to match target logo size
  const targetScale = toRect.width / ghostSize;

  // Force reflow, then fly to land exactly on the receipt logo
  ghost.offsetHeight;
  requestAnimationFrame(() => {
    ghost.classList.add('is-flying');
    ghost.style.left = (toRect.left + toRect.width/2 - ghostSize/2) + 'px';
    ghost.style.top = (toRect.top + toRect.height/2 - ghostSize/2) + 'px';
    ghost.style.transform = `scale(${targetScale})`;
    ghost.style.opacity = '0';
  });

  // After the fly animation, collapse rail and clean up
  setTimeout(() => {
    ghost.remove();
    const rail = document.getElementById('modelRail');
    rail.classList.remove('is-open');
    if(callback) callback();
  }, 750);
}

function finishRouting(meta, ms){
  if(scanTimer) clearInterval(scanTimer);
  scanTimer = null;
  scanIndex = -1;
  stopCounterRotation();
  railState = {
    mode:'complete',
    selected: meta?.chosen_tier || null,
    verified: Boolean(meta?.verified),
    escalatedTo: meta?.escalated_to || null,
    cacheHit: Boolean(meta?.cache_hit),
  };
  renderRail();
  
  // Render the inspector but keep it hidden so the target exists
  showInspector(meta, ms, true);
  
  // Fly the winner to the receipt, then reveal the receipt
  setTimeout(() => flyToReceipt(meta, () => {
    const ib = document.getElementById('inspectorBody');
    if(ib) {
      ib.style.opacity = '1';
      ib.style.transition = 'opacity .4s ease';
    }
  }), 800);
}

function resetRail(){
  if(scanTimer) clearInterval(scanTimer);
  scanTimer = null;
  scanIndex = -1;
  stopCounterRotation();
  railState = {mode:'idle', selected:null, verified:false, escalatedTo:null, cacheHit:false};
  renderRail();
  // Keep rail collapsed when idle
  const rail = document.getElementById('modelRail');
  rail.classList.remove('is-open');
}

function div(cls, html){
  const d = document.createElement('div');
  d.className = cls;
  if(html != null) d.innerHTML = html;
  return d;
}

function applyMath(el){
  if(window.renderMathInElement){
    renderMathInElement(el, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\[', right: '\\]', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ],
      throwOnError: false
    });
  }
}

function renderTurn(turn){
  const wrap = div('turn');
  if(turn.role === 'user'){
    wrap.appendChild(div('bubble user', esc(turn.content)));
  } else {
    if(turn.meta) wrap.classList.add('selectable');
    const bubble = div('bubble answer', renderMarkdown(turn.content));
    applyMath(bubble);
    wrap.appendChild(bubble);
    if(turn.events) wrap.appendChild(traceBlock(turn.events));
    if(turn.meta) wrap.addEventListener('click', () => showInspector(turn.meta, turn.ms));
  }
  feed.appendChild(wrap);
  return wrap;
}

function renderAll(){
  feed.querySelectorAll('.turn').forEach(n => n.remove());
  setEmpty();
  history.forEach(renderTurn);
  const last = [...history].reverse().find(m => m.role === 'assistant' && m.meta);
  if(last) showInspector(last.meta, last.ms);
  else clearInspector();
  feed.scrollTop = feed.scrollHeight;
}

function showInspector(m, ms, hidden = false){
  const selected = m.cache_hit ? 'T0' : m.chosen_tier;
  const model = modelForTier(selected);
  const saved = m.baseline_cost_usd > 0 ? (100 * (1 - m.cost_usd / m.baseline_cost_usd)) : 0;
  const verdict = m.verdict || (m.verified ? 'sampled' : 'not sampled');
  const cache = m.cache_hit ? 'hit' : 'miss';
  const escLabel = m.escalated_to ? `to ${m.escalated_to}` : 'none';
  const modelDetail = m.model_id || model.detail;
  const tokenClass = model.token || '';

  if (hidden) {
    inspectorBody.style.opacity = '0';
    inspectorBody.style.transition = 'none';
  } else {
    inspectorBody.style.opacity = '1';
    inspectorBody.style.transition = 'none';
  }

  inspectorBody.innerHTML = `
    <div class="inspector-model">
      <div class="inspector-token ${tokenClass}">${logoHtml(model)}</div>
      <div class="inspector-title">
        <b>${esc(model.name)} · ${esc(selected)}</b>
        <span>${esc(modelDetail)}</span>
      </div>
    </div>
    <div class="inspector-save">${saved.toFixed(1)}% saved</div>
    <div class="inspector-kv">
      <div class="inspector-row"><span>Type</span><b>${esc(m.task_type)}</b></div>
      <div class="inspector-row"><span>Cost</span><b>${usd(m.cost_usd)}</b></div>
      <div class="inspector-row"><span>Cloud base</span><b>${usd(m.baseline_cost_usd)}</b></div>
      <div class="inspector-row"><span>Cache</span><b>${esc(cache)}</b></div>
      <div class="inspector-row"><span>Verify</span><b>${esc(verdict)} · ${esc(escLabel)}</b></div>
      ${m.context_note ? `<div class="inspector-row"><span>Context</span><b>${esc(m.context_note)}</b></div>` : ''}
    </div>
    <div class="inspector-why">${esc(m.rationale || '')} · ${Number(ms || 0)} ms</div>
  `;
}

function clearInspector(){
  inspectorBody.style.opacity = '1';
  inspectorBody.style.transition = 'opacity .3s ease';
  inspectorBody.innerHTML = '<div class="inspector-empty">Run or select a response to see routing, cost, cache, and verifier details.</div>';
}

function traceBlock(events, opts = {}){
  const box = document.createElement('details');
  box.className = 'route-trace';
  if(opts.live){
    box.open = true;
    box.classList.add('is-live');
  }
  box.innerHTML = `
    <summary>
      <span class="trace-summary-left">Routing trace</span>
      <span class="trace-summary-right">0 steps</span>
    </summary>
    <div class="trace-list"></div>
  `;
  (events || []).forEach(ev => appendTraceEvent(box, ev));
  return box;
}

function appendTraceEvent(box, ev){
  const stage = ev.stage || 'STEP';
  const label = STAGE_LABELS[stage] || stage.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  const detail = ev.detail || '';
  const extra = Object.fromEntries(Object.entries(ev).filter(([k]) => !['stage', 'detail'].includes(k)));
  const extraKeys = Object.keys(extra);
  const list = box.querySelector('.trace-list') || box;
  const extraHtml = extraKeys.length ? `
    <details class="trace-extra">
      <summary>details</summary>
      <pre>${esc(JSON.stringify(extra, null, 2))}</pre>
    </details>` : '';
  list.appendChild(div('trace-item', `
    <div class="trace-branch" aria-hidden="true"></div>
    <div class="trace-node">
      <div class="trace-main">
        <div class="trace-used">Used</div>
        <div class="trace-name">${esc(label)}</div>
        <div class="trace-stage">${esc(stage)}</div>
      </div>
      <div class="trace-detail">${esc(detail || 'complete')}</div>
      ${extraHtml}
    </div>
  `));
  updateTraceSummary(box);
}

function updateTraceSummary(box){
  const items = [...box.querySelectorAll('.trace-item')];
  const last = items[items.length - 1];
  const stage = last?.querySelector('.trace-stage')?.textContent || '';
  const left = box.querySelector('.trace-summary-left');
  const right = box.querySelector('.trace-summary-right');
  if(left) left.textContent = stage === 'DONE' ? 'Routing complete' : (box.classList.contains('is-live') ? 'Routing...' : 'Routing trace');
  if(right) right.textContent = `${items.length} step${items.length === 1 ? '' : 's'}`;
}

function finishTrace(box){
  box.classList.remove('is-live');
  updateTraceSummary(box);
  box.open = false;
}

async function readSSE(res, onItem){
  if(!res.body) throw new Error('streaming response unavailable');
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while(true){
    const {value, done} = await reader.read();
    if(done) break;
    buf += decoder.decode(value, {stream:true});
    const chunks = buf.split('\n\n');
    buf = chunks.pop() || '';
    for(const chunk of chunks){
      const data = chunk.split('\n')
        .filter(line => line.startsWith('data:'))
        .map(line => line.slice(5).trim())
        .join('\n');
      if(data) onItem(JSON.parse(data));
    }
  }
}

async function ask(text){
  history.push({role:'user', content:text});
  save();
  setEmpty();
  renderTurn(history[history.length - 1]);
  clearInspector();
  beginRouting();

  const thinking = div('thinking', '<span class="spinner"></span><span>Routing</span>');
  const twrap = div('turn');
  const events = [{stage:'ROUTING', detail:text}];
  const trace = traceBlock(events, {live:true});
  twrap.appendChild(thinking);
  twrap.appendChild(trace);
  feed.appendChild(twrap);
  feed.scrollTop = feed.scrollHeight;

  const t0 = performance.now();
  try{
    const payload = history.map(({role, content}) => ({role, content}));
    const res = await fetch('/v1/route/stream', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({messages: payload})
    });
    if(!res.ok) throw new Error(`request failed: ${res.status}`);
    let data = null;
    let blocked = null;
    await readSSE(res, item => {
      if(item.stage === 'RESULT'){
        data = item;
        return;
      }
      events.push(item);
      appendTraceEvent(trace, item);
      if(item.stage === 'QUARANTINE' || item.stage === 'ERROR') blocked = item;
      feed.scrollTop = feed.scrollHeight;
    });
    const ms = Math.round(performance.now() - t0);

    if(blocked && !data){
      resetRail();
      thinking.remove();
      const msg = blocked.stage === 'QUARANTINE' ? 'Blocked: ' : 'Error: ';
      twrap.insertBefore(div('bubble answer', msg + esc(blocked.detail || 'request failed')), trace);
      twrap.querySelector('.answer').style.borderColor = 'var(--pro)';
      finishTrace(trace);
      feed.scrollTop = feed.scrollHeight;
      return;
    }
    if(!data) throw new Error('stream ended without result');

    thinking.remove();
    const answer = data.answer;
    finishRouting(data.tokentriage, ms);
    const bubble = div('bubble answer', renderMarkdown(answer));
    applyMath(bubble);
    twrap.insertBefore(bubble, trace);
    twrap.classList.add('selectable');
    twrap.addEventListener('click', () => showInspector(data.tokentriage, ms));
    history.push({role:'assistant', content:answer, meta:data.tokentriage, ms, events});
    finishTrace(trace);
    save();
  }catch(e){
    resetRail();
    thinking.remove();
    twrap.insertBefore(div('bubble answer', 'Error: ' + esc(e.message)), trace);
    twrap.querySelector('.answer').style.borderColor = 'var(--pro)';
    finishTrace(trace);
  }
  feed.scrollTop = feed.scrollHeight;
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  send.disabled = true;
  await ask(text);
  send.disabled = false;
  input.focus();
});

document.getElementById('clear').addEventListener('click', (e)=>{
  e.preventDefault();
  history = [];
  convId = newConvId();                 // start a NEW conversation
  localStorage.setItem(CONV_KEY, convId);
  save();                               // persist() no-ops on empty history
  renderAll();
  resetRail();
  clearInspector();
  refreshHistory();
  input.focus();
});

// --- Saved-conversation history (server-side) -----------------------------
async function refreshHistory(){
  const list = document.getElementById('historyList');
  const count = document.getElementById('historyCount');
  list.innerHTML = '<div class="hist-empty">Loading...</div>';
  try{
    const items = await (await fetch('/conversations')).json();
    count.textContent = items.length ? String(items.length) : '';
    if(!items.length){ list.innerHTML = '<div class="hist-empty">No saved chats yet.</div>'; return; }
    list.innerHTML = items.map(it => `
      <div class="history-item ${it.id===convId?'is-active':''}">
        <a class="history-load" href="#" data-load="${esc(it.id)}">
          <b>${it.is_pinned ? '📌 ' : ''}${esc(it.title || 'Untitled')}</b>
          <span>${it.n} msgs · ${new Date((it.updated_at||0)*1000).toLocaleDateString()}</span>
        </a>
        <div class="history-menu-wrap">
          <a href="#" class="history-menu-btn" aria-label="Menu">•••</a>
          <div class="history-dropdown">
            <a href="#" data-rename="${esc(it.id)}" data-title="${esc(it.title || '')}">Rename</a>
            <a href="#" data-pin="${esc(it.id)}" data-pinned="${it.is_pinned}">
              ${it.is_pinned ? 'Unpin' : 'Pin'}
            </a>
            <a href="#" class="is-danger" data-del="${esc(it.id)}">Delete</a>
          </div>
        </div>
      </div>`).join('');
  }catch(e){
    count.textContent = '';
    list.innerHTML = '<div class="hist-empty">Failed to load chats.</div>';
  }
}
async function loadConversation(id){
  try{
    const data = await (await fetch('/conversations/' + encodeURIComponent(id))).json();
    history = data.messages || [];
    convId = id;
    localStorage.setItem(CONV_KEY, convId);
    localStorage.setItem(KEY, JSON.stringify(history));
    renderAll();
    const last = [...history].reverse().find(m => m.role === 'assistant' && m.meta);
    if(last) showInspector(last.meta, last.ms);
    resetRail();
    refreshHistory();
    input.focus();
  }catch(e){}
}
async function delConversation(id){
  try{ await fetch('/conversations/' + encodeURIComponent(id), {method:'DELETE'}); }catch(e){}
  if(id === convId){
    history = [];
    convId = newConvId();
    localStorage.setItem(CONV_KEY, convId);
    localStorage.setItem(KEY, JSON.stringify(history));
    renderAll();
    resetRail();
  }
  refreshHistory();
}
document.addEventListener('click', e => {
  if(!e.target.closest('.history-menu-wrap')) {
    document.querySelectorAll('.history-dropdown').forEach(d => d.classList.remove('is-open'));
  }
});

document.getElementById('historyList').addEventListener('click', async e => {
  const load = e.target.closest('[data-load]');
  if(load && e.target.tagName !== 'INPUT'){
    e.preventDefault();
    await loadConversation(load.dataset.load);
    return;
  }

  const menuBtn = e.target.closest('.history-menu-btn');
  if(menuBtn){
    e.preventDefault();
    document.querySelectorAll('.history-dropdown').forEach(d => {
      if(d !== menuBtn.nextElementSibling) d.classList.remove('is-open');
    });
    menuBtn.nextElementSibling.classList.toggle('is-open');
    return;
  }

  const renameBtn = e.target.closest('[data-rename]');
  if(renameBtn){
    e.preventDefault();
    const wrap = renameBtn.closest('.history-item');
    const loadLink = wrap.querySelector('.history-load');
    const bTag = loadLink.querySelector('b');
    bTag.style.display = 'none';
    
    let input = loadLink.querySelector('.history-rename-input');
    if(!input){
      input = document.createElement('input');
      input.className = 'history-rename-input';
      input.value = renameBtn.dataset.title;
      loadLink.insertBefore(input, bTag);
      
      const saveTitle = async () => {
        const newTitle = input.value.trim();
        if(newTitle && newTitle !== renameBtn.dataset.title) {
          try {
            await fetch('/conversations/' + encodeURIComponent(renameBtn.dataset.rename), {
              method:'PATCH', headers:{'content-type':'application/json'},
              body: JSON.stringify({title: newTitle})
            });
            refreshHistory();
          }catch(e){}
        } else {
          input.remove();
          bTag.style.display = '';
        }
      };
      
      input.addEventListener('blur', saveTitle);
      input.addEventListener('keydown', ev => {
        if(ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
        if(ev.key === 'Escape') { 
          input.value = renameBtn.dataset.title; // revert
          input.blur();
        }
      });
    }
    renameBtn.closest('.history-dropdown').classList.remove('is-open');
    input.focus();
    return;
  }

  const pinBtn = e.target.closest('[data-pin]');
  if(pinBtn){
    e.preventDefault();
    const isPinned = pinBtn.dataset.pinned === '1';
    try {
      await fetch('/conversations/' + encodeURIComponent(pinBtn.dataset.pin) + '/pin', {
        method:'PATCH', headers:{'content-type':'application/json'},
        body: JSON.stringify({is_pinned: !isPinned ? 1 : 0})
      });
      refreshHistory();
    }catch(e){}
    return;
  }

  const delBtn = e.target.closest('[data-del]');
  if(delBtn){
    e.preventDefault();
    if(confirm('Delete this conversation?')) await delConversation(delBtn.dataset.del);
    return;
  }
});

document.querySelectorAll('.example').forEach(btn => {
  btn.addEventListener('click', () => {
    input.value = btn.textContent;
    form.requestSubmit();
  });
});

input.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});

renderRail();
renderAll();
refreshHistory();
</script>
