# TokenTriage routing policy — declarative governance.
# Business rules live HERE, not in Python. `tokentriage policy check` validates.

policies:
  default:
    # Cheapest tier whose measured accuracy for the task type >= this floor wins.
    accuracy_floor: 0.90
    # Skip tiers whose p50 latency exceeds this (ms).
    latency_slo_ms: 4000
    # Budget circuit breaker: expensive-tier routing halts at this daily cap (USD).
    daily_budget_usd: 5.00

  # Per-task-type overrides. Tiers: T0=cache, T1=flash-lite, T2=flash, T3=pro.
  task_overrides:
    legal_or_financial:
      min_tier: T3          # no-key fallback is strongest local tier
      prefer_cloud: true    # with OpenRouter key, route compliance/risk work to T4
    factual_lookup:
      max_tier: T1          # never waste Pro on lookups
    creative_short:
      max_tier: T2

  escalation:
    max_hops: 3             # verifier fail -> local tiers, then OpenRouter rescue if configured
    verify_sample_rate: 0.25  # fraction of cheap-tier answers sent to verifier

  cache:
    enabled: false
    similarity_threshold: 0.95   # cosine sim on embeddings to count as a hit
    ttl_hours: 168               # 1 week

  security:
    max_input_chars: 20000
    rate_limit_per_minute: 60

  # Context privacy: governs what conversation history is sent to CLOUD tiers.
  # Local (Ollama) tiers always get full context — it never leaves the machine.
  privacy:
    cloud_context: summary   # full | none | last_n | summary
    context_last_n: 2        # turns of history to keep when cloud_context=last_n
    # Sensitive-content firewall: prior turns flagged legal/financial/medical are
    # NEVER included in a cloud request, regardless of cloud_context mode.
    sensitive_firewall: true
