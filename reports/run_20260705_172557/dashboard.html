<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenTriage Evidence Dashboard</title>
<style>
body{margin:0;padding:24px;background:#f8f5ee;color:#17201c;font:15px/1.45 system-ui,-apple-system,Segoe UI,sans-serif}
.shell{max-width:1120px;margin:auto;display:grid;gap:18px}
.hero,.card{background:#fffdf8;border:1px solid #d7d0c2;border-radius:10px;box-shadow:0 18px 55px rgba(28,32,28,.10)}
.hero{padding:22px;display:grid;gap:8px}
h1{margin:0;font-size:28px} h2{margin:0 0 10px;font-size:16px}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.metric{padding:16px;background:#fffdf8;border:1px solid #d7d0c2;border-radius:8px}
.metric span{display:block;color:#6a706b;font:800 11px/1 ui-monospace,Menlo,monospace;text-transform:uppercase}
.metric b{display:block;margin-top:8px;font:900 28px/1 ui-monospace,Menlo,monospace}
.save b{color:#168a68}
.card{padding:18px;overflow:auto}
.bars{display:grid;gap:10px}
.bar{display:grid;grid-template-columns:52px 1fr 50px;gap:10px;align-items:center;font:800 12px/1 ui-monospace,Menlo,monospace}
.track{height:14px;background:#f0eee7;border-radius:999px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#168a68,#385acb)}
table{width:100%;border-collapse:collapse;font-size:13px} th,td{border-bottom:1px solid #d7d0c2;padding:9px;text-align:left;vertical-align:top}
th{color:#6a706b;font:800 10px/1 ui-monospace,Menlo,monospace;text-transform:uppercase}
input{width:100%;height:38px;margin-bottom:12px;border:1px solid #d7d0c2;border-radius:8px;padding:0 10px;background:#fffdf8;color:#17201c}
@media(max-width:760px){.metric-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

    <h2>Routing Ledger</h2>
    <input id="filter" placeholder="Filter tasks, types, tiers">
    <table><thead><tr><th>Task</th><th>Type</th><th>Tier</th><th>Cost</th><th>Latency</th><th>Verify</th></tr></thead><tbody id="rows"></tbody></table>
  </section>
</div>

expected_type": "summarization", "predicted_type": "summarization", "chosen_tier": "T2", "cost_usd": 1.077e-05, "baseline_usd": 0.00066125, "dispatch_latency_ms": 2911.0, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Simple summary of business metrics and issues. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Summarize the key point: The migration to the new data warehouse reduced query latency by 60% but doubled storage costs; finance has asked engineering to evaluate tiered storage before further rollout.", "expected_type": "summarization", "predicted_type": "summarization", "chosen_tier": "T2", "cost_usd": 1.101e-05, "baseline_usd": 0.00071625, "dispatch_latency_ms": 3222.8, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Simple summary of technical and financial impacts. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Write a two-line friendly reminder to the team that timesheets are due Friday.", "expected_type": "creative_short", "predicted_type": "creative_short", "chosen_tier": "T1", "cost_usd": 2e-06, "baseline_usd": 0.00027625, "dispatch_latency_ms": 659.6, "cache_hit": false, "verified": true, "verdict": "pass", "escalated_to": "", "rationale": "Short and simple creative writing task. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Write a one-sentence product tagline for a reusable coffee cup.", "expected_type": "creative_short", "predicted_type": "creative_short", "chosen_tier": "T1", "cost_usd": 1.46e-06, "baseline_usd": 0.00017375, "dispatch_latency_ms": 446.7, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Short creative task with known constraints | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Draft a short thank-you note for a customer who reported a bug.", "expected_type": "creative_short", "predicted_type": "creative_short", "chosen_tier": "T1", "cost_usd": 8.91e-06, "baseline_usd": 0.00166375, "dispatch_latency_ms": 3645.0, "cache_hit": false, "verified": true, "verdict": "pass", "escalated_to": "", "rationale": "Short creative task with standard phrasing | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Our support bot handled 12,000 queries last month at $0.008 each on the premium model. If 70% could run on a model costing $0.0004 per query, calculate the monthly and yearly savings, and explain the assumptions in your calculation.", "expected_type": "multi_step_reasoning", "predicted_type": "multi_step_reasoning", "chosen_tier": "T3", "cost_usd": 0.00015545, "baseline_usd": 0.005965, "dispatch_latency_ms": 56992.1, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Involves multiple steps of calculation and explanation. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Compare our Q3 revenue of $2.4M against a forecast of $2.1M and a Q2 actual of $2.3M. Compute growth rates, explain the variance versus forecast, and list two plausible drivers to investigate.", "expected_type": "multi_step_reasoning", "predicted_type": "multi_step_reasoning", "chosen_tier": "T3", "cost_usd": 0.0001434, "baseline_usd": 0.00551875, "dispatch_latency_ms": 52166.4, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "taxonomy backstop -> multi_step_reasoning (LLM said summarization) | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "A warehouse ships 500 orders/day with a 2% error rate. A new scanner cuts errors by 60% but adds 5 seconds per order. At 8 seconds baseline per order and $0.90 cost per error, is the scanner worth it? Show your reasoning.", "expected_type": "multi_step_reasoning", "predicted_type": "multi_step_reasoning", "chosen_tier": "T3", "cost_usd": 0.00017285, "baseline_usd": 0.00666375, "dispatch_latency_ms": 63714.8, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Involves multiple steps of calculation and reasoning about cost-effectiveness. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "We have three vendor quotes: A charges $10k flat, B charges $6k plus $50 per unit, C charges $80 per unit. At what unit volumes is each vendor cheapest? Walk through the breakeven analysis.", "expected_type": "multi_step_reasoning", "predicted_type": "multi_step_reasoning", "chosen_tier": "T3", "cost_usd": 0.00017075, "baseline_usd": 0.00661, "dispatch_latency_ms": 72987.3, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Requires comparing costs and solving for breakeven points. | met accuracy but skipped due to latency (p95 72404ms > 4000.0ms); used as fallback"}, {"task": "Write a Python function that takes a list of (timestamp, cost) tuples and returns cumulative daily spend as a dict keyed by date.", "expected_type": "code_generation", "predicted_type": "code_generation", "chosen_tier": "T3", "cost_usd": 0.0001731, "baseline_usd": 0.00677, "dispatch_latency_ms": 76660.4, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Generating a Python function with basic logic for aggregation. | met accuracy but skipped due to latency (p95 72987ms > 4000.0ms); used as fallback"}, {"task": "Write a SQL query that returns the top 5 customers by total order value in the last 90 days from tables orders(id, customer_id, total, created_at) and customers(id, name).", "expected_type": "code_generation", "predicted_type": "code_generation", "chosen_tier": "T3", "cost_usd": 8.6e-05, "baseline_usd": 0.0032475, "dispatch_latency_ms": 39801.8, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "This task requires writing a SQL query which involves multiple steps. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Write a Python decorator that retries a function up to 3 times with exponential backoff.", "expected_type": "code_generation", "predicted_type": "code_generation", "chosen_tier": "T3", "cost_usd": 0.0001387, "baseline_usd": 0.00541875, "dispatch_latency_ms": 64558.4, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "This task requires writing code for a specific functionality. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Does our standard consulting contract's limitation-of-liability clause typically cover indirect damages, and what should we ask legal to review before signing a variant that caps liability at fees paid?", "expected_type": "legal_or_financial", "predicted_type": "legal_or_financial", "chosen_tier": "T3", "cost_usd": 0.00011215, "baseline_usd": 0.00431, "dispatch_latency_ms": 49712.9, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Involves specific legal terms and potential financial implications. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Explain the tax implications of classifying a worker as a contractor versus an employee for a US small business, and what factors determine the classification.", "expected_type": "legal_or_financial", "predicted_type": "legal_or_financial", "chosen_tier": "T3", "cost_usd": 0.00017555, "baseline_usd": 0.0068625, "dispatch_latency_ms": 77778.5, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "sensitive-term backstop matched 'tax'; pinned to top tier (was factual_lookup) | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "What should we consider before recognizing revenue on a 12-month SaaS contract paid upfront?", "expected_type": "legal_or_financial", "predicted_type": "legal_or_financial", "chosen_tier": "T3", "cost_usd": 0.00014705, "baseline_usd": 0.00575, "dispatch_latency_ms": 66030.2, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "sensitive-term backstop matched 'contract'; pinned to top tier (was classification) | met accuracy but skipped due to latency (p95 73950ms > 4000.0ms); used as fallback"}, {"task": "What is the capital of Australia, please?", "expected_type": "factual_lookup", "predicted_type": "factual_lookup", "chosen_tier": "T1", "cost_usd": 1.16e-06, "baseline_usd": 0.0001275, "dispatch_latency_ms": 1998.5, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Simple factual question with a short answer. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Which city is Australia's capital?", "expected_type": "factual_lookup", "predicted_type": "factual_lookup", "chosen_tier": "T1", "cost_usd": 7.17e-06, "baseline_usd": 0.001335, "dispatch_latency_ms": 3327.8, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Simple factual question about a well-known fact. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Summarize in two sentences: Our Q3 launch shipped on time, adoption exceeded forecast by 12%, but churn in the SMB segment rose 3 points due to onboarding friction, which the CS team is addressing with a new guided setup flow. Thanks!", "expected_type": "summarization", "predicted_type": "summarization", "chosen_tier": "T2", "cost_usd": 1.087e-05, "baseline_usd": 0.00066375, "dispatch_latency_ms": 3349.5, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Simple summary of business metrics and issues. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Is this review positive or negative: 'Setup took five minutes and it worked perfectly out of the box.'", "expected_type": "classification", "predicted_type": "classification", "chosen_tier": "T1", "cost_usd": 4.4e-06, "baseline_usd": 0.0007425, "dispatch_latency_ms": 1828.8, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "Short text with clear sentiment, straightforward classification. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Write a two-line reminder that the office is closed Monday for the public holiday.", "expected_type": "creative_short", "predicted_type": "creative_short", "chosen_tier": "T2", "cost_usd": 6.28e-06, "baseline_usd": 0.00022625, "dispatch_latency_ms": 1777.3, "cache_hit": false, "verified": true, "verdict": "pass", "escalated_to": "T2", "rationale": "Short creative task with simple content. | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Explain step by step how compound interest differs from simple interest, with a 3-year example at 5% on $1,000 for both.", "expected_type": "multi_step_reasoning", "predicted_type": "multi_step_reasoning", "chosen_tier": "T3", "cost_usd": 0.00023495, "baseline_usd": 0.0092275, "dispatch_latency_ms": 98814.9, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "taxonomy backstop -> multi_step_reasoning (LLM said summarization) | met accuracy but skipped due to latency (p95 73079ms > 4000.0ms); used as fallback"}, {"task": "Write a Python function to validate that a string is a well-formed semantic version (major.minor.patch).", "expected_type": "code_generation", "predicted_type": "code_generation", "chosen_tier": "T3", "cost_usd": 0.0001595, "baseline_usd": 0.0062425, "dispatch_latency_ms": 68026.2, "cache_hit": false, "verified": false, "verdict": "", "escalated_to": "", "rationale": "This task requires writing code, which is more complex than simple lookup or classification. | met accuracy but skipped due to latency (p95 73950ms > 4000.0ms); used as fallback"}];
const usd = v => '$' + Number(v || 0).toFixed(6);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
document.getElementById('metrics').innerHTML = [
  ['Requests', metrics.requests],
  ['TokenTriage Cost', usd(metrics.cost_usd)],
  ['Always-Frontier', usd(metrics.baseline_usd)],
  ['Savings', metrics.savings_pct + '%', 'save'],
  ['Cache Hits', metrics.cache_hits],
  ['Escalations', metrics.escalations],
  ['Avg Dispatch', metrics.avg_dispatch_latency_ms + ' ms'],
  ['P95 Dispatch', metrics.p95_dispatch_latency_ms + ' ms'],
  ['Taxonomy Accuracy', metrics.taxonomy_accuracy + '%'],
  ['Security Blocks', metrics.security_blocks],
].map(m => `<div class="metric ${m[2]||''}"><span>${m[0]}</span><b>${m[1]}</b></div>`).join('');
const util = metrics.tier_utilization || {};
const max = Math.max(1, ...Object.values(util));
document.getElementById('tiers').innerHTML = Object.keys(util).sort().map(k => `<div class="bar"><span>${k}</span><div class="track"><div class="fill" style="width:${100*util[k]/max}%"></div></div><span>${util[k]}</span></div>`).join('');
function render(q=''){
  const f = q.toLowerCase();
  document.getElementById('rows').innerHTML = rows.filter(r => JSON.stringify(r).toLowerCase().includes(f)).map(r => `<tr><td>${esc(r.task)}</td><td>${esc(r.predicted_type)}</td><td>${esc(r.chosen_tier)}</td><td>${usd(r.cost_usd)}</td><td>${Number(r.dispatch_latency_ms || 0).toFixed(0)} ms</td><td>${esc(r.verdict || (r.escalated_to ? 'escalated' : 'not sampled'))}</td></tr>`).join('');
}
document.getElementById('filter').addEventListener('input', e => render(e.target.value));
render();
</script>
</body>
</html>
